<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0; 
            color: white; 
        }
        header{
            background-color: rgb(0, 0, 0);
            padding: 20px;
        }
        .nav-bar{
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 18px;
        }
        ul{
            display: flex;
            gap: 40px;
        }
        ul li{
            list-style: none;
        }
        ul li a{
            text-decoration: none;
        }
        .hero{
            text-align: center;
            align-items: center;
            justify-content: center;
            display: flex;
            flex-direction: column;
            height: 90vh;
            background: linear-gradient(90deg,rgba(42, 123, 155, 1) 0%, rgba(87, 199, 133, 1) 50%, rgba(237, 221, 83, 1) 100%);           
        }
        .hero h2{
            font-size: 40px;
        }
        .hero button{
            border-radius: 5px;
            color: black;
            padding: 5px;
            margin-top: 10px;
        }
        .hero button :hover{
            background: red;
        }
    </style>
</head>
<body>
    <header>
        <nav class="nav-bar">
            <h2>ROMA</h2>
            <ul>
                <li><a href="">Home</a></li>
                <li><a href="">Features</a></li>
                <li><a href="">Contact</a></li>
            </ul>
        </nav>
    </header>
    <section class="hero">
        <h2>Welcome to My Website</h2>
        <p>Create something amazing with HTML & CSS</p>
        <button>Get Started</button>
    </section>
</body>
</html>

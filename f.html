<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main{
            justify-content: center;
            display: flex;
            gap: 1px;
        }
        .main :hover{
            transform: scale(1.2);
        }
        .basic{
            margin: auto;
            padding: 20px;
            text-align: center;
            border: 2px solid black;
            margin: auto;
            border-radius: 20px;
            width: 200px;
            height: 300px;
            background-color: wheat;
        }
        .pro{
            text-align: center;
            border: 2px solid black;
            border-radius: 20px;
            width: 300px;
            height: 400px;
            background-color: rgb(248, 118, 118);
        }
        .ultimate{
            text-align: center;
            border: 2px solid black;
            border-radius: 20px;
            margin: auto;
            width: 200px;
            height: 300px;
            background-color: wheat;
        }
        ul li{
            list-style: none;
        }
    </style>
</head>
<body>
    <div class="main">
        
        <div class="basic">
            <h3>Basic</h3>
            <p>0 Rs.</p>
            <ul>
                <li>1 Project</li>
                <li>Basic Support</li>
            </ul>
            <button>Start Free</button>
        </div>

        <div class="pro">
            <h3>Pro</h3>
            <p>50 Rs.</p>
            <ul>
                <li>Ultimate Project</li>
                <li>Priority Support</li>
                <li>Custom Domains</li>
            </ul>
            <button>Go Pro</button>
        </div>

        <div class="ultimate">
            <h3>Ultimate</h3>
            <p>100 Rs.</p>
            <ul>
                <li>Team Access</li>
                <li>24/7 Support</li>
            </ul>
            <button>Contact Us</button>
        </div>
    </div>
</body>
</html>

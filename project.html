<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
        }
        header{
            background-color: rgba(0, 0, 0, 0.46);
            padding: 10px;
        }
        header nav ul li{
            display: flex;
        }
        header nav ul li a{
            text-decoration: none;
            color: beige;
        }
        .nav-bar{
            display: flex;
            gap: 80px;
            justify-content: right;
            margin-right: 40px;
        }
        div img{
            width: 100%;
            height: 1500px;
        }
        .first-div{
            background-color: rgba(0, 0, 0, 0.096);
            width: 100%;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .order{
            display: flex;
            border-radius: 8%;
            background-color: red;   
            width: 100px;
            height: 40px;
            justify-content: center;
            text-align: center;
            padding: 5px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <input placeholder="Search Food">
            <ul class="nav-bar">
                <li><input placeholder="search food"></li>
                <li><a href="">Home</a></li>
                <li><a href="">About</a></li>
                <li><a href="">Contact</a></li>
                <li><a href="">Product</a></li>
            </ul>
        </nav>
    </header>
    <div class="first-div">
        <div class="sub-div">
            <div class="order">Order Here</div>
        </div>
    </div>
</body>
</html>
